services:
  - type: web
    name: vibe-prospecting
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: bunx prisma generate && bun run build
    startCommand: bunx prisma migrate deploy && NODE_ENV=production node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vibe-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: vibe-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://vibe-prospecting.onrender.com

databases:
  - name: vibe-db
    region: oregon
    plan: free
    databaseName: vibe_prospecting

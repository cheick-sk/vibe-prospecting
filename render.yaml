services:
  - type: web
    name: vibe-prospecting
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && NODE_ENV=production node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vibe-prospecting-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: vibe-prospecting-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://vibe-prospecting.onrender.com
